<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💘 Walentynki</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 20px;
}

/* 🐱 KOTEK */
.kitty {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    opacity: 0.95;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
    animation: kittyFloat 4s ease-in-out infinite;
    z-index: 2;
}

@keyframes kittyFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
}

/* Serduszka */
.hearts span {
    position: absolute;
    bottom: -50px;
    font-size: 18px;
    animation: float 6s linear infinite;
    opacity: 0.7;
}

@keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
}

/* Karta */
.container {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    padding: 80px 30px 40px; /* miejsce na kotka */
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.2);
    animation: fadeIn 1.2s ease;
    position: relative;
    z-index: 1;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

h1 {
    color: #fff;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    margin-bottom: 15px;
}

p {
    color: #fff;
    font-size: clamp(1rem, 4vw, 1.1rem);
    margin-bottom: 30px;
}

/* Przyciski */
.buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    height: 70px;
    position: relative;
}

button {
    padding: 16px 34px;
    border-radius: 50px;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.4s ease;
}

#yes {
    background: #fff;
    color: #ff5f8a;
    font-weight: 600;
}

#yes.center {
    transform: scale(1.2);
}

#no {
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
}

/* Wybuch */
.explode {
    animation: explode 0.5s ease forwards;
}

@keyframes explode {
    to { transform: scale(0); opacity: 0; }
}

.particle {
    position: absolute;
    width: 7px;
    height: 7px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    animation: particle 0.6s ease-out forwards;
}

@keyframes particle {
    to {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
    }
}

/* 📱 Mobile */
@media (max-width: 420px) {
    .kitty {
        width: 100px;
        top: 60px;
    }

    .container {
        padding: 70px 22px 35px;
    }

    button {
        width: 100%;
        max-width: 160px;
    }
}
</style>
</head>
<body>

<!-- 🐱 KOTEK -->
<img src="https://www.nicepng.com/png/full/170-1705295_hello-kitty-is-the-most-successful-and-globalized.png" class="kitty" alt="kotek">

<!-- 🎵 MUZYKA -->
<audio id="music" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<div class="hearts">
    <span style="left:10%">💗</span>
    <span style="left:30%">💖</span>
    <span style="left:50%">💘</span>
    <span style="left:70%">💓</span>
    <span style="left:90%">💞</span>
</div>

<div class="container">
    <h1>Olusiu czy zostaniesz moją walentynką? 💕</h1>
    <p>Obiecuję dużo uśmiechu i ciepłych chwil ✨</p>

    <div class="buttons">
        <button id="yes" onclick="yes()">TAK 💘</button>
        <button id="no" onclick="explodeNo(event)">NIE 🙃</button>
    </div>
</div>

<script>
let musicStarted = false;

function startMusic() {
    if (!musicStarted) {
        document.getElementById("music").play();
        musicStarted = true;
    }
}

function yes() {
    startMusic();
    document.querySelector('.container').innerHTML = `
        <h1>TAKKK 🥹💖</h1>
        <p>To oficjalnie najlepsze walentynki ever 💫</p>
    `;
}

function explodeNo(e) {
    startMusic();

    const no = e.target;
    const yes = document.getElementById("yes");
    const parent = no.parentElement;

    for (let i = 0; i < 10; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = no.offsetLeft + no.offsetWidth / 2 + "px";
        p.style.top = no.offsetTop + no.offsetHeight / 2 + "px";
        p.style.setProperty("--x", `${Math.random()*140-70}px`);
        p.style.setProperty("--y", `${Math.random()*140-70}px`);
        parent.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }

    no.classList.add("explode");

    setTimeout(() => {
        no.remove();
        yes.classList.add("center");
    }, 450);
}
</script>

</body>
</html>
