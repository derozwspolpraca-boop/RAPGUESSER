<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpotMyBackup - Spotify Backup</title>
</head>
<body>
<h1>SpotMyBackup</h1>
<button id="loginBtn">Zaloguj się Spotify</button>
<pre id="output"></pre>

<script>
const CLIENT_ID = "5d867ef16c2145418964f19110140c42";
const REDIRECT_URI = "https://derozwspolpraca-boop.github.io/walentynki/";
const SCOPES = [
  "playlist-read-private",
  "playlist-modify-private",
  "playlist-modify-public"
];
let accessToken = null;

// Funkcja logowania
function login() {
  const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES.join(" "))}`;
  // 🔑 ważne: window.location.href musi zostać wywołane
  window.location.href = url;
}

// Odczyt tokenu z URL po powrocie
function getTokenFromHash() {
  const hash = window.location.hash;
  if (hash) {
    const params = new URLSearchParams(hash.slice(1));
    const token = params.get("access_token");
    if (token) {
      accessToken = token;
      document.getElementById("output").textContent = "Zalogowano! Token: " + accessToken.substring(0, 20) + "...";
    }
    // czyścimy hash z URL
    history.replaceState("", document.title, window.location.pathname);
  }
}

document.getElementById("loginBtn").addEventListener("click", login);

// sprawdzamy przy ładowaniu
window.onload = getTokenFromHash;
</script>
</body>
</html>
