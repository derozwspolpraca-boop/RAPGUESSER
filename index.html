<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpotMyBackup PKCE</title>
</head>
<body>
<h1>SpotMyBackup PKCE</h1>
<button id="loginBtn">Zaloguj się Spotify</button>
<button id="backupBtn" disabled>Backup Playlist</button>
<button id="restoreBtn" disabled>Restore Playlist</button>
<pre id="output"></pre>

<script>
// ================= CONFIG =================
const CLIENT_ID = "5d867ef16c2145418964f19110140c42";
const REDIRECT_URI = "https://derozwspolpraca-boop.github.io/walentynki/";
const SCOPES = [
  "playlist-read-private",
  "playlist-modify-private",
  "playlist-modify-public",
  "user-library-read",
  "user-library-modify"
];
let accessToken = null;

// =============== PKCE HELPERS ===================
function base64URLEncode(str) {
  return btoa(String.fromCharCode.apply(null, new Uint8Array(str)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return hash;
}

function generateRandomString(length) {
  const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += charset.charAt(Math.floor(Math.random() * charset.length));
  }
  return result;
}

// =============== LOGIN / AUTH ===================
async function login() {
  const codeVerifier = generateRandomString(128);
  localStorage.setItem('code_verifier', codeVerifier);
  const hashed = await sha256(codeVerifier);
  const codeChallenge = base64URLEncode(hashed);

  const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}` +
    `&response_type=code` +
    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
    `&scope=${encodeURIComponent(SCOPES.join(' '))}` +
    `&code_challenge_method=S256&code_challenge=${codeChallenge}`;
  
  window.location.href = authUrl;
}

// =============== GET TOKEN ===================
async function getTokenFromCode() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return;

  const codeVerifier = localStorage.getItem('code_verifier');
  if (!codeVerifier) return;

  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    code: code,
    redirect_uri: REDIRECT_URI,
    client_id: CLIENT_ID,
    code_verifier: codeVerifier
  });

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  });

  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    document.getElementById("backupBtn").disabled = false;
    document.getElementById("restoreBtn").disabled = false;
    document.getElementById("output").textContent = "Zalogowano! Token: " + accessToken.substring(0,20) + "...";
    // wyczyść query params
    history.replaceState("", document.title, window.location.pathname);
  } else {
    document.getElementById("output").textContent = "Błąd logowania: " + JSON.stringify(data);
  }
}

// =============== BACKUP ===================
async function backupPlaylists() {
  if (!accessToken) return alert("Nie jesteś zalogowany!");
  let playlists = [];
  let url = "https://api.spotify.com/v1/me/playlists?limit=50";
  while(url) {
    const res = await fetch(url, { headers: { Authorization: "Bearer " + accessToken } });
    const data = await res.json();
    playlists.push(...data.items);
    url = data.next;
  }
  document.getElementById("output").textContent = JSON.stringify(playlists, null, 2);
}

// =============== RESTORE ===================
async function restorePlaylists() {
  if (!accessToken) return alert("Nie jesteś zalogowany!");
  const jsonInput = prompt("Wklej JSON z backupu:");
  if (!jsonInput) return;
  const playlists = JSON.parse(jsonInput);

  for(let pl of playlists) {
    const res = await fetch("https://api.spotify.com/v1/users/me/playlists", {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({ name: pl.name, description: pl.description || "", public: pl.public })
    });
    const newPlaylist = await res.json();

    if (pl.tracks && pl.tracks.items) {
      const trackUris = pl.tracks.items.map(t => t.track.uri).filter(Boolean);
      for (let i=0; i<trackUris.length; i+=100) {
        const chunk = trackUris.slice(i,i+100);
        await fetch(`https://api.spotify.com/v1/playlists/${newPlaylist.id}/tracks`, {
          method: 'POST',
          headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
          body: JSON.stringify({ uris: chunk })
        });
      }
    }
  }
  alert("Restore zakończony!");
}

// =============== EVENT LISTENERS ===================
document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("backupBtn").addEventListener("click", backupPlaylists);
document.getElementById("restoreBtn").addEventListener("click", restorePlaylists);

// =============== INIT ===================
window.onload = getTokenFromCode;

</script>
</body>
</html>
