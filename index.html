<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Nasze Walentynki ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", system-ui, sans-serif;
}

body {
  background: linear-gradient(180deg, #ffe0ec, #ffc2d6);
  color: #5a0033;
  overflow-x: hidden;
}

/* ================= PRELOADER ================= */
#preloader {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #ffe0ec, #ffc2d6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity .6s ease, visibility .6s ease;
}
#preloader.hide { opacity: 0; visibility: hidden; }

.loader-heart {
  width: 90px;
  height: 90px;
  background: #ff2d55;
  transform: rotate(-45deg);
  position: relative;
  animation: pulse 1.4s ease-in-out infinite;
}
.loader-heart::before,
.loader-heart::after {
  content: "";
  position: absolute;
  width: 90px;
  height: 90px;
  background: #ff2d55;
  border-radius: 50%;
}
.loader-heart::before { top: -45px; left: 0; }
.loader-heart::after { left: 45px; top: 0; }

@keyframes pulse {
  0% { transform: rotate(-45deg) scale(1); }
  50% { transform: rotate(-45deg) scale(1.15); }
  100% { transform: rotate(-45deg) scale(1); }
}

/* ================= ANIMOWANE TŁO ================= */
.bg {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: -1;
}
.bg-heart {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #ff4f87;
  transform: rotate(-45deg);
  animation: float linear infinite;
  opacity: 0.5;
}
.bg-heart::before,
.bg-heart::after {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  background: #ff4f87;
  border-radius: 50%;
}
.bg-heart::before { top: -7px; left: 0; }
.bg-heart::after { left: 7px; top: 0; }

@keyframes float {
  from { transform: translateY(110vh) rotate(-45deg); }
  to { transform: translateY(-10vh) rotate(-45deg); }
}

/* ================= LAYOUT ================= */
main {
  max-width: 900px;
  margin: auto;
  padding: 24px;
  opacity: 0;
  transition: opacity .6s ease;
}

section {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(10px);
  border-radius: 22px;
  padding: 26px;
  margin-bottom: 26px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.12);
}

h1, h2 {
  text-align: center;
  margin-bottom: 12px;
}

/* ================= TIMER ================= */
.counter {
  text-align: center;
  font-size: 1.15rem;
  font-weight: 600;
}

/* ================= GALERIA ================= */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.photo {
  background: #ffd6e6;
  aspect-ratio: 1/1;
  border-radius: 16px;
  cursor: pointer;
  overflow: hidden;
  transition: transform .3s ease;
}
.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.photo:hover { transform: scale(1.05); }

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 18px;
}
.modal.show { display: flex; }

/* ================= QUIZ SLIDER ================= */
.quiz-wrapper {
  overflow: hidden;
}
.quiz-track {
  display: flex;
  transition: transform .6s ease;
}
.quiz-slide {
  min-width: 100%;
}

.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}
.answer {
  background: #ffb3cf;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  transition: transform .2s ease, background .2s ease;
}
.answer:hover { background: #ff94bd; transform: scale(1.05); }
.answer.correct { background: #4caf50; color: #fff; }
.answer.wrong { background: #e53935; color: #fff; }

.result {
  text-align: center;
  font-weight: 700;
  margin-top: 20px;
  font-size: 1.2rem;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div id="preloader">
  <div class="loader-heart"></div>
</div>

<main id="main">

<!-- ================= HEADER ================= -->
<section>
  <h1>❤️ Nasze Walentynki ❤️</h1>
  <p style="text-align:center">Razem od <b>16.07.2024</b></p>
  <div class="counter" id="counter"></div>
</section>

<!-- ================= GALERIA ================= -->
<section>
  <h2>📸 Nasze chwile</h2>
  <div class="gallery">
    <div class="photo" onclick="openImg(this)"><img src="https://picsum.photos/600?1"></div>
    <div class="photo" onclick="openImg(this)"><img src="https://picsum.photos/600?2"></div>
    <div class="photo" onclick="openImg(this)"><img src="https://picsum.photos/600?3"></div>
    <div class="photo" onclick="openImg(this)"><img src="https://picsum.photos/600?4"></div>
  </div>
</section>

<!-- ================= QUIZ ================= -->
<section>
  <h2>💗 Quiz o nas</h2>
  <div class="quiz-wrapper">
    <div class="quiz-track" id="quizTrack"></div>
  </div>
  <div class="result" id="result"></div>
</section>

</main>

<!-- MODAL -->
<div class="modal" id="modal" onclick="this.classList.remove('show')">
  <img id="modalImg">
</div>

<script>
/* PRELOADER */
window.addEventListener("load", () => {
  setTimeout(() => {
    preloader.classList.add("hide");
    main.style.opacity = 1;
  }, 900);
});

/* TIMER LIVE */
const startDate = new Date("2024-07-16T00:00:00");
function updateCounter() {
  const now = new Date();
  let diff = now - startDate;

  const d = Math.floor(diff / 86400000);
  diff %= 86400000;
  const h = Math.floor(diff / 3600000);
  diff %= 3600000;
  const m = Math.floor(diff / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  counter.textContent = `${d} dni ${h}h ${m}m ${s}s 💞`;
}
updateCounter();
setInterval(updateCounter, 1000);

/* GALERIA MODAL */
function openImg(el) {
  modalImg.src = el.querySelector("img").src;
  modal.classList.add("show");
}

/* QUIZ SLIDER */
const quizData = Array.from({ length: 10 }, (_, i) => ({
  q: `Pytanie ${i + 1}`,
  a: ["A", "B", "C", "D"],
  correct: Math.floor(Math.random() * 4)
}));

const track = document.getElementById("quizTrack");
let index = 0;
let score = 0;

quizData.forEach((q, qi) => {
  const slide = document.createElement("div");
  slide.className = "quiz-slide";
  slide.innerHTML = `<p><b>${qi + 1}. ${q.q}</b></p>`;

  const answers = document.createElement("div");
  answers.className = "answers";

  q.a.forEach((txt, ai) => {
    const a = document.createElement("div");
    a.className = "answer";
    a.textContent = txt;

    a.onclick = () => {
      if (a.classList.contains("clicked")) return;
      a.classList.add("clicked");

      if (ai === q.correct) {
        a.classList.add("correct");
        score++;
      } else {
        a.classList.add("wrong");
        answers.children[q.correct].classList.add("correct");
      }

      setTimeout(() => {
        index++;
        if (index < quizData.length) {
          track.style.transform = `translateX(-${index * 100}%)`;
        } else {
          result.textContent = `Wynik końcowy: ${score} / ${quizData.length} 💘`;
        }
      }, 700);
    };

    answers.appendChild(a);
  });

  slide.appendChild(answers);
  track.appendChild(slide);
});

/* SERDUSZKA TŁO */
for (let i = 0; i < 35; i++) {
  const h = document.createElement("div");
  h.className = "bg-heart";
  h.style.left = Math.random() * 100 + "%";
  h.style.animationDuration = 8 + Math.random() * 12 + "s";
  bg.appendChild(h);
}
</script>

</body>
</html>
